name: Global Critical Minerals Macro Policy Radar

# 触发机制配置
on:
  schedule:
    # 按照周级别运行设定：每周一早上 09:00 (北京/印尼/西八区时间 UTC+8)
    # 注：GitHub Cron 使用 UTC 时间，01:00 UTC 即为北京时间 09:00
    - cron: '0 1 * * 1'
  workflow_dispatch: # 保留手动触发按钮，方便随时在 GitHub 网页上人工点火

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取最新的代码仓
    - name: Checkout Code Base
      uses: actions/checkout@v4

    # 2. 部署专用的 Python 环境 (确保全自动化依赖隔离)
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 自动缓存依赖，加速每周运行

    # 3. 安装清道夫及大脑所需的所有第三方依赖
    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 执行核心研判引擎，并将 GitHub 加密仓库变量安全注入进程环境
    - name: Execute DeepSeek Intelligence Engine
      env:
        OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        OPENAI_BASE_URL: "https://api.deepseek.com"
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      run: |
        python3 main.py