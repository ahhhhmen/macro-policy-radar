version: "2.0"
last_updated: "2026-06-22"
description: |
  全球关键矿产政策事实基线库。经 2026 年 6 月实时情报核对。
  大模型推演必须以此为锚点，除非最新情报明确宣告基线已被新法案颠覆。

baselines:
  ID:
    country: "印度尼西亚 (Indonesia)"
    rules:
      - "出口禁令常识：2020年起全面禁镍原矿出口，2023年禁铝土矿。任何限制开采的新规，冲击的都是『印尼国内冶炼厂的原料供给（内贸溢价）』，绝对不可能是『原矿出口量』。"
      - "RKAB机制：RKAB是印尼采矿与销售的唯一合法配额凭证（现效力3年）。受反腐及环境合规驱动，当前审批严苛，未获批矿山必须停产。"
      - "定向推演路径：上游合法配额受限 → 中游国内镍矿供给紧张、内贸原矿溢价(HPM)上行、独立冶炼厂利润挤压、一体化矿企获相对成本优势 → 下游全球中间品(MHP/镍铁)底部价格支撑强化。"

  PH:
    country: "菲律宾 (Philippines)"
    rules:
      - "出口现状：全球红土镍矿核心出口国。2025年中期《采矿财政制度法案》已正式剔除原矿出口禁令条款，转向财政税收（利润分成）为主。暂无断供风险。"
      - "推演逻辑：博弈点转向高额采矿税与环保审查。任何菲国矿权异动或税费上调，将直接推高中国本土 NPI（镍铁）企业的原料采购成本。"

  ZW:
    country: "津巴布韦 (Zimbabwe)"
    rules:
      - "出口禁令常识：原矿(DSO)出口早已禁止。当前政策焦点是锂精矿管控——政府已对锂精矿出口加征16%出口税，并计划于2027年1月起全面禁止锂精矿出口。"
      - "推演逻辑：津国政策旨在逼迫矿企建设碳酸锂/硫酸锂冶炼厂。任何加码新规，均直接大幅推高外资在当地的二次 Capex（资本开支），影响中资矿企投资回报模型。"

  CN:
    country: "中国 (China)"
    rules:
      - "出口管制升级路径：2023年对镓/锗实施出口许可制，2024年对石墨及锑实施管制（9月生效）。自2026年起，白银及部分关键金属正式进入『国营贸易授权框架（白名单制）』，实现从防扩散式限制向精准实体白名单审核的升级。"
      - "推演逻辑：国内管制收紧将抬升海外下游产业的原料获取难度与通关周期，相对增强国内产业链成本优势。对海外依赖中国原料的冶炼厂构成供应链中断风险。"

  GH:
    country: "加纳 (Ghana)"
    rules:
      - "绿色矿产政策：2026年3月议会正式批准首个锂矿协议（Atlantic Lithium 的 Ewoyaa 项目），标志着《绿色矿产政策》走完立法和实操闭环。政策要求禁止未加工锂矿出口，政府强制入股比例底线大幅提高（13-15%以上）。"
      - "推演逻辑：强制入股与本地加工条款极大压缩外资矿企的初期资本回报率（IRR），强制拉动本地冶炼基建投入。加纳做法正在成为非洲标杆（非盟2025年2月通过全非《绿色矿产战略》）。"

  EU:
    country: "欧盟 (European Union)"
    rules:
      - "市场壁垒法则：CRMA（关键原材料法案，65%单一国家依赖上限）及新电池法已全面激活，2027年起电池护照强制追溯碳足迹。"
      - "推演逻辑：欧盟本土无矿，政策不产生源头『断供』。推演必须聚焦于『市场准入壁垒』——抬升亚洲矿企的碳足迹追溯与 ESG 合规审计成本，可能形成事实上的绿色贸易壁垒。"

  AR:
    country: "阿根廷 (Argentina)"
    rules:
      - "国家投资导向：RIGI（大型投资激励制度）2024年通过，已延期至2027年。提供25%固定所得税上限、30年外汇稳定期与关税豁免，极度鼓励外资开采出口。2025-2026年超1000亿美元意向项目排队申请。"
      - "推演逻辑：国家层面全力促供给。摩擦主要源自省级地方政府的特许权分配争议与环保抗议。推演应聚焦于项目落地的行政延期风险，而非政策转向风险。"
