version: "5.3"

# =====================================================================
#  三层寻源架构（v3.2 中文政策信号增强版）
#  第 1 层：静态靶向源 —— 人工精选的官方政府网站 + 国家通讯社/党报 RSS
#  第 2 层：声明式查询矩阵 —— 矿种 × 关键词自动生成全覆盖 NewsAPI 查询
#  第 3 层：自适应热点发现 —— DeepSeek 每周推荐新兴热点（已启用）
#
#  v3.2 更新：
#    - 从 top-rss-list 新增 5 个中文政策信号源：
#      新华社、路透中文、人民日报、参考消息、央视新闻
#    - 第 1 层中文 RSS 源从 3 个扩展到 8 个，实现党报-通讯社-财经媒体全覆盖
#  v3.1 修复：
#    - policy_keywords 从 10 个扩展至 25 个，覆盖 DSI/统购统销/供应链尽责/ESG
#    - 新增中国国务院、商务部静态源，打通中文政策源头
#    - 新增印尼贸易部（Kemendag）静态源，覆盖 DSI 政策源头
#    - 启用自适应热点发现（B 方案），每周捕获新兴政策动态
# =====================================================================

# ---- 第 2 层：声明式查询矩阵（方案 A）----
query_matrix:
  minerals:
    - Lithium
    - Cobalt
    - Nickel
    - Copper
    - "Rare Earths"
    - Graphite
    - Tungsten
    - Gallium
    - Germanium
    - Indium
  policy_keywords:
    # 传统贸易壁垒类（保留）
    - "Export Ban"
    - "Export Restriction"
    - Tariff
    - Royalty
    - Tax
    - Quota
    - Beneficiation
    - Nationalization
    - "Foreign Equity"
    - "Resource Nationalism"
    # 国家统购/供应义务类（新增 — 覆盖印尼 DSI 等政策）
    - "Domestic Supply Obligation"
    - "State Procurement"
    - "Mandatory Offtake"
    - "Price Control"
    - "Strategic Stockpile"
    - "Supply Nationalization"
    - "Bulk Purchasing"
    # 供应链合规/尽责类（新增 — 覆盖中国 834/835 号法案等）
    - "Supply Chain Due Diligence"
    - "ESG Regulation"
    - "Forced Labor Prevention"
    - "Carbon Border Adjustment"
    - "Cross-Border Compliance"
    # 绿色壁垒/新兴产业政策（前瞻覆盖）
    - "Critical Minerals Strategy"
    - "Green Subsidy"
    - "IRA"
  days_back: 7

# ---- 第 3 层：自适应热点发现（方案 B — 已启用）----
adaptive_discovery:
  enabled: true       # v3.1: 开启，每周借助 DeepSeek 生成当周前沿查询
  max_hotspots: 10    # 每次最多补充 N 条动态查询

# ---- 第 1 层：静态靶向源（官方网页，一锤定音）----
macro_sources:
  # ---- 印尼 ----
  - id: "id_esdm_news"
    country: "ID"
    agency: "印尼能源与矿产资源部"
    feed_type: "html"
    url: "https://www.esdm.go.id/en/media-center/news-archives"
    dom_selector: "section:not(#running-news)"
    enabled: true

  - id: "id_kemendag"
    country: "ID"
    agency: "印尼贸易部 (Kemendag)"
    feed_type: "html"
    url: "https://www.kemendag.go.id/berita"
    dom_selector: "div.news-list, article"
    enabled: true
    notes: "DSI 统购统销政策的核心发布渠道"

  - id: "id_maritim"
    country: "ID"
    agency: "印尼海洋与投资统筹部"
    feed_type: "html"
    url: "https://maritim.go.id/"
    dom_selector: "div.post-content, article"
    enabled: true
    notes: "印尼矿产下游化（Hilirisasi）与投资政策统筹机构"

  # ---- 中国 ----
  - id: "cn_broad_newsapi_zh"
    country: "CN"
    agency: "中国矿产政策-NewsAPI中文宽泛扫描"
    feed_type: "newsapi"
    query: '"关键矿产" OR "稀土" OR "钴" OR "镍" OR "锂矿" OR "石墨" OR "铜" (出口 OR 管制 OR 关税 OR 配额 OR 外资 OR 供应链 OR 国有化 OR 禁令)'
    days_back: 30
    enabled: true
    notes: "中文宽泛扫描 — 覆盖各省商务厅/工信厅等不在静态源列表中的政策文章"

  - id: "cn_state_council"
    country: "CN"
    agency: "中华人民共和国国务院"
    feed_type: "html"
    url: "https://www.gov.cn/zhengce/zuixin/home.htm"
    dom_selector: "div.news_box, ul.listTxt, li.listTxt, div.list, div.content, div.page-content"
    enabled: false
    notes: "⚠️ 全站 JS 渲染，已禁用。改用下方 RSS 管道覆盖。"

  - id: "cn_policy_rss_zh"
    country: "CN"
    agency: "中国宏观政策-RSS中文专线"
    feed_type: "rss"
    url: "https://news.google.com/rss/search?q=中国+供应链尽责+出口管制+关键矿产+产业政策&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
    enabled: true
    notes: "中文 RSS 专线：覆盖国务院 834/835 号、出口管制、供应链尽责等政策"

  - id: "global_proper_nouns_rss"
    country: "GLOBAL"
    agency: "专有名词穿透扫描（Danantara/RKAB/RMAP/SCDDP/RCI）"
    feed_type: "rss"
    url: "https://news.google.com/rss/search?q=%22Critical+Minerals%22+OR+Nickel+OR+Lithium+OR+Copper+OR+Cobalt+%22Export+Ban%22+OR+Tariff+OR+Danantara+OR+RKAB+OR+%22Due+Diligence%22+OR+%22Supply+Chain+Audit%22+OR+%22ESG+Certification%22+OR+%22Responsible+Mining%22+OR+CSRD+OR+CSDDD+OR+%22Battery+Regulation%22+OR+CBAM&hl=en-US&gl=US&ceid=US:en"
    enabled: true
    notes: "v5.2 概念伞扫描：用 ESG Certification/Responsible Mining/Supply Chain Audit 等大词捕获 IRMA/Nickel Mark/Copper Mark 等未知标准"

  - id: "cn_policy_rss_en"
    country: "CN"
    agency: "中国宏观政策-RSS英文专线"
    feed_type: "rss"
    url: "https://news.google.com/rss/search?q=China+supply+chain+due+diligence+export+control+critical+minerals+policy&hl=en-US&gl=US&ceid=US:en"
    enabled: true
    notes: "英文 RSS 专线：China supply chain due diligence / export control 等补充覆盖"

  # ---- v3.2: top-rss-list 精选中文政策信号源（8 源全覆盖）----
  - id: "cn_qstheory"
    country: "CN"
    agency: "求是网"
    feed_type: "rss"
    url: "https://plink.anyfeeder.com/qstheory"
    enabled: true
    notes: "中共中央机关刊 — 重大政策理论前置信号，834/835 号等国务院法令风向标"

  - id: "cn_xiake_island"
    country: "CN"
