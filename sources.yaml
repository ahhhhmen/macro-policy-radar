  # ---- v3.2: top-rss-list 扩展 —— 国家通讯社 / 党报 / 财经通讯社 ----
  - id: "cn_xinhua"
    country: "CN"
    agency: "新华社"
    feed_type: "rss"
    url: "https://plink.anyfeeder.com/newscn/whxw"
