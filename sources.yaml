    feed_type: "rss"
    url: "https://plink.anyfeeder.com/weixin/ckxxwx"
    enabled: true
    notes: "外媒编译精选 — 反向推断中国决策层关注的国际政策舆情与应对方向"

  - id: "cn_cctv"
    country: "CN"
    agency: "央视新闻"
    feed_type: "rss"
    url: "https://plink.anyfeeder.com/weixin/cctvnewscenter"
    enabled: true
    notes: "国家广播电视台 — 国务院常务会议/部委联合发布会等重大政策首播渠道"

  - id: "cn_mofcom"
