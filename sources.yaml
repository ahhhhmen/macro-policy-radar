    feed_type: "rss"
    url: "https://plink.anyfeeder.com/weixin/xiake_island"
    enabled: true
    notes: "涉外政策权威解读 — 供应链尽责、出口管制等跨境议题深度分析"

  - id: "cn_caixin"
    country: "CN"
