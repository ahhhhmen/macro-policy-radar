version: "3.0"

# =====================================================================
#  三层寻源架构
#  第 1 层：静态靶向源 —— 人工精选的官方政府网站，CSS 精准抓取
#  第 2 层：声明式查询矩阵 —— 矿种 × 关键词自动生成全覆盖 NewsAPI 查询
#  第 3 层：自适应热点发现 —— DeepSeek 每周推荐新兴热点（可选开关）
# =====================================================================

# ---- 第 2 层：声明式查询矩阵（方案 A — 替代手写 dynamic_aggregators）----
query_matrix:
  minerals:
    - Lithium
    - Cobalt
    - Nickel
    - Copper
    - "Rare Earths"
    - Graphite
  policy_keywords:
    - "Export Ban"
    - "Export Restriction"
    - Tariff
    - Royalty
    - Tax
    - Quota
    - Beneficiation
    - Nationalization
    - "Foreign Equity"
    - "Resource Nationalism"
  days_back: 7

# ---- 第 3 层：自适应热点发现（方案 B — 可选开关）----
adaptive_discovery:
  enabled: false      # 设为 true 开启：每次运行额外调用 DeepSeek 生成当周热点查询
  max_hotspots: 5     # 每次最多补充 N 条动态查询

# ---- 第 1 层：静态靶向源（官方网页，一锤定音）----
macro_sources:
  - id: "id_esdm_news"
    country: "ID"
    agency: "印尼能源与矿产资源部"
    feed_type: "html"
    url: "https://www.esdm.go.id/en/media-center/news-archives"
    dom_selector: "section:not(#running-news)"
    enabled: true
